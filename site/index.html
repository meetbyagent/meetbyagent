<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentMeet — Your agent schedules for you</title>
  <meta name="description" content="Send a link. Their agent and your agent negotiate the time. No more back-and-forth.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 720px;
      width: 100%;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 2.5rem;
    }
    .command {
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.25);
      border-radius: 12px;
      padding: 1.25rem 2rem;
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: #4ade80;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      user-select: all;
      position: relative;
      margin-bottom: 2.5rem;
    }
    .command:hover {
      background: rgba(74, 222, 128, 0.14);
      border-color: rgba(74, 222, 128, 0.4);
    }
    .command .copied {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(74, 222, 128, 0.12);
      border-radius: 11px;
      color: #4ade80;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .command .copied.show { opacity: 1; }
    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      max-width: 540px;
      font-weight: 400;
    }
    footer {
      padding: 2rem 0 0.5rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.3);
    }
    footer a {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    footer a:hover { color: rgba(255, 255, 255, 0.7); }
    footer span { margin: 0 0.5rem; }
  </style>
</head>
<body>
  <main>
    <h1>Your agent schedules for you.</h1>
    <div class="command" onclick="copyCommand(this)" role="button" tabindex="0" aria-label="Copy command to clipboard">
      npx meetbyagent
      <span class="copied">Copied</span>
    </div>
    <p class="subtitle">Send a link. Their agent and your agent negotiate the time. No more back-and-forth.</p>
  </main>
  <footer>
    Built on <a href="https://github.com/agent-social-protocol/agent-social-protocol">ASP</a>
    <span>&middot;</span>
    <a href="https://github.com/agent-social-protocol/agent-social-protocol">GitHub</a>
  </footer>
  <script>
    function copyCommand(el) {
      var text = el.childNodes[0].textContent.trim();
      navigator.clipboard.writeText(text).then(function () {
        var badge = el.querySelector('.copied');
        badge.classList.add('show');
        setTimeout(function () { badge.classList.remove('show'); }, 1200);
      });
    }
    document.querySelectorAll('.command').forEach(function (el) {
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copyCommand(el); }
      });
    });
  </script>
</body>
</html>
